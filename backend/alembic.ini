# alembic.ini — Alembic configuration for ResumeIQ
# Run migrations with: alembic upgrade head

[alembic]
# Path to migration scripts directory (relative to this file)
script_location = alembic

# Template for migration file naming: timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Max length of slug in migration filename
truncate_slug_length = 40

# Revision ID source — random by default
revision_environment = false

# SQLAlchemy URL — overridden in env.py by reading from .env
# This value is a fallback only; real URL comes from settings.
sqlalchemy.url = postgresql://user:password@localhost/resumeiq

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
